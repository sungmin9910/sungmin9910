<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Sim | Premium 3D Simulator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Three.js CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <canvas id="sim-canvas"></canvas>
        
        <div class="ui-overlay">
            <header>
                <div class="logo">
                    <span class="status-dot"></span>
                    <h1>AUTONOMOUS<span>SIM</span></h1>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <label>SPEED</label>
                        <span id="speed-val">0</span> <small>km/h</small>
                    </div>
                    <div class="stat-item">
                        <label>STATUS</label>
                        <span id="status-val" class="active">MANUAL</span>
                    </div>
                </div>
            </header>

            <main>
                <div class="control-help">
                    <p>WASD to Move | Click to Navigate</p>
                </div>

                <!-- 로드뷰 패널 -->
                <div id="roadview-panel" class="roadview-panel">
                    <div class="panel-header">
                        <span class="live-tag">LIVE</span>
                        REAL-TIME ROAD VIEW
                    </div>
                    <div class="iframe-wrapper">
                        <iframe id="street-view-iframe" src="" frameborder="0"></iframe>
                    </div>
                </div>
            </main>

            <footer>
                <div class="telemetry">
                    <div class="telemetry-item">X: <span id="pos-x">0.0</span></div>
                    <div class="telemetry-item">Y: <span id="pos-y">0.0</span></div>
                    <div class="telemetry-item">Z: <span id="pos-z">0.0</span></div>
                </div>
            </footer>
        </div>
    </div>
    <script type="module" src="simulator.js"></script>
</body>
</html>
